apiVersion: apps/v1
kind: Deployment
metadata:
  name: ig-publisher
  namespace: marketing-automation
  labels:
    app: ig-publisher
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ig-publisher
  template:
    metadata:
      labels:
        app: ig-publisher
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: publisher
        image: registry.sredevops.org/ig-publisher:1.0.0 # Your internal registry
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: IG_USER_ID
          valueFrom:
            secretKeyRef:
              name: ig-credentials
              key: user_id
        - name: IG_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: ig-credentials
              key: access_token
        - name: GCP_SA_KEY_PATH
          value: "/secrets/gcp-sa-key.json"
        - name: GCS_BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: ig-config
              key: gcs_bucket_name
        volumeMounts:
        - name: gcp-sa-key
          mountPath: /secrets
          readOnly: true
        - name: media-storage
          mountPath: /media
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true # Highly recommended for immutable infrastructure
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
      volumes:
      - name: gcp-sa-key
        secret:
          secretName: gcp-sa-key
      - name: media-storage
        persistentVolumeClaim:
          claimName: media-assets-pvc # Or use a CSI driver for GCP Filestore/GCS FUSE