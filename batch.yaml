apiVersion: batch/v1
kind: Job
metadata:
  name: ig-publisher-job
  namespace: marketing-automation
  labels:
    app: ig-publisher
    tier: backend
spec:
  ttlSecondsAfterFinished: 86400 # Clean up pod after 24h
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: publisher
        image: registry.sredevops.org/ig-publisher:1.0.0 # Your internal registry
        imagePullPolicy: IfNotPresent
        args: ["/media/campaign_video.mp4", "--caption", "K8s automated post! ☸️"]
        env:
        - name: IG_USER_ID
          valueFrom:
            secretKeyRef:
              name: ig-credentials
              key: user_id
        - name: IG_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: ig-credentials
              key: access_token
        volumeMounts:
        - name: media-storage
          mountPath: /media
          readOnly: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true # Highly recommended for immutable infrastructure
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
      volumes:
      - name: media-storage
        persistentVolumeClaim:
          claimName: media-assets-pvc # Or use a CSI driver for GCP Filestore/GCS FUSE