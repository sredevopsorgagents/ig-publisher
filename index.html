<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IG Publisher</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #333;
        }

        .card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input[type="file"],
        textarea {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #E1306C;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 4px;
            display: none;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .status.info {
            background: #e2e3e5;
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .drafts-section {
            margin-top: 2rem;
        }

        .draft-item {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .draft-info {
            flex: 1;
        }

        .draft-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            width: auto;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-danger {
            background: #dc3545;
        }
    </style>
</head>
<body>
    <h1>Instagram Publisher</h1>
    <div class="card">
        <form id="publishForm">
            <label for="media">Media File (Image/Video)</label>
            <input type="file" id="media" name="file" accept="image/*,video/*" required>
            <label for="caption">Caption</label>
            <textarea id="caption" name="caption" rows="4" placeholder="Write your caption here..."></textarea>
            <label>
                <input type="checkbox" id="isDraft" name="is_draft"> Save as Draft (don't publish yet)
            </label>
            <button type="submit" id="submitBtn">Publish to Instagram</button>
        </form>
    </div>

    <div id="statusBox" class="status"></div>
    <div class="drafts-section card">
        <h2>Drafts</h2>
        <div id="draftsList"></div>
    </div>
    <script>
        const form = document.getElementById('publishForm');
        const statusBox = document.getElementById('statusBox');
        const submitBtn = document.getElementById('submitBtn');
        const draftsList = document.getElementById('draftsList');

        // Load drafts on page load
        loadDrafts();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            statusBox.className = 'status info';
            statusBox.innerText = 'Uploading file and starting process...';

            const formData = new FormData(form);
            const isDraft = document.getElementById('isDraft').checked;
            formData.set('is_draft', isDraft);

            try {
                const response = await fetch('/publish', { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Upload failed');
                const data = await response.json();

                if (isDraft) {
                    statusBox.className = 'status success';
                    statusBox.innerText = 'Draft saved successfully!';
                    loadDrafts();
                    form.reset();
                    submitBtn.disabled = false;
                } else {
                    pollStatus(data.job_id);
                }
            } catch (err) {
                statusBox.className = 'status error';
                statusBox.innerText = 'Error: ' + err.message;
                submitBtn.disabled = false;
            }
        });

        async function pollStatus(jobId) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`/jobs/${jobId}`);
                    const data = await res.json();
                    statusBox.innerText = data.log;

                    if (data.status === 'SUCCESS') {
                        statusBox.className = 'status success';
                        clearInterval(interval);
                        submitBtn.disabled = false;
                        form.reset();
                    } else if (data.status === 'FAILED') {
                        statusBox.className = 'status error';
                        clearInterval(interval);
                        submitBtn.disabled = false;
                    }
                } catch (err) {
                    clearInterval(interval);
                    statusBox.className = 'status error';
                    statusBox.innerText = 'Lost connection to server.';
                    submitBtn.disabled = false;
                }
            }, 3000);
        }

        async function loadDrafts() {
            try {
                const res = await fetch('/drafts');
                const data = await res.json();
                renderDrafts(data.drafts || {});
            } catch (err) {
                console.error('Failed to load drafts:', err);
            }
        }

        function renderDrafts(drafts) {
            draftsList.innerHTML = '';
            const draftArray = Object.entries(drafts);

            if (draftArray.length === 0) {
                draftsList.innerHTML = '<p style="color: #666; font-style: italic;">No drafts saved.</p>';
                return;
            }

            draftArray.forEach(([containerId, draft]) => {
                const div = document.createElement('div');
                div.className = 'draft-item';
                div.innerHTML = `
                    <div class="draft-info">
                        <strong>${draft.caption || '(No caption)'}</strong><br>
                        <small>Status: ${draft.status} | Created: ${new Date(draft.created_at).toLocaleString()}</small>
                    </div>
                    <div class="draft-actions">
                        ${draft.status === 'draft' ? `<button class="btn-small btn-success" onclick="publishDraft('${containerId}')">Publish</button>` : ''}
                        <button class="btn-small btn-danger" onclick="deleteDraft('${containerId}')">Delete</button>
                    </div>
                `;
                draftsList.appendChild(div);
            });
        }

        async function publishDraft(containerId) {
            if (!confirm('Are you sure you want to publish this draft?')) return;

            try {
                const res = await fetch(`/drafts/${containerId}/publish`, { method: 'POST' });
                if (!res.ok) throw new Error('Failed to publish draft');
                const data = await res.json();
                statusBox.className = 'status info';
                statusBox.innerText = 'Publishing draft...';
                pollStatus(data.job_id);
                loadDrafts();
            } catch (err) {
                statusBox.className = 'status error';
                statusBox.innerText = 'Error: ' + err.message;
            }
        }

        async function deleteDraft(containerId) {
            if (!confirm('Are you sure you want to delete this draft?')) return;

            try {
                const res = await fetch(`/drafts/${containerId}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Failed to delete draft');
                loadDrafts();
                statusBox.className = 'status success';
                statusBox.innerText = 'Draft deleted successfully!';
            } catch (err) {
                statusBox.className = 'status error';
                statusBox.innerText = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
