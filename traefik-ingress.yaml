apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: basic-auth
  namespace: marketing-automation
spec:
  basicAuth:
    secret: basic-auth-secret
    removeHeader: true

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ig-publisher-ingress
  namespace: marketing-automation
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ig-publisher.example.com`)
      kind: Rule
      services:
        - name: ig-publisher-service
          port: 8000
      middlewares:
        - name: ig-publisher-rate-limit
        - name: basic-auth
  tls:
    secretName: ig-publisher-tls-secret

---
# Secret containing basic auth credentials (username: admin, password: changeme)
# Generate with: htpasswd -nb admin changeme | base64
# Or use: echo $(htpasswd -nb admin changeme) | base64
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth-secret
  namespace: marketing-automation
type: Opaque
data:
  # Default credentials: admin / changeme
  # Replace with your own generated hash using: htpasswd -nb <username> <password> | base64
  users: CHANGEME


---
apiVersion: v1
kind: Service
metadata:
  name: ig-publisher-service
  namespace: marketing-automation
  labels:
    app: ig-publisher
spec:
  selector:
    app: ig-publisher
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
# Add this to your Middleware definitions
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ig-publisher-rate-limit
  namespace: marketing-automation
spec:
  rateLimit:
    average: 5      # 5 requests per second
    burst: 10       # Allow short bursts up to 10
    period: 30m