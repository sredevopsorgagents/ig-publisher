# Replace the value of `gcp-sa-key.json` with the base64-encoded
# contents of your service account JSON.
# Example: `base64 -w0 gcp-sa-key.json` on Linux/macOS and paste the output.
apiVersion: v1
kind: Secret
metadata:
  name: gcp-sa-key
  namespace: marketing-automation
type: Opaque
data:
  gcp-sa-key.json: <BASE64_ENCODED_SERVICE_ACCOUNT_JSON>
